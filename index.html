<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Akrif Sweet — Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Scrollbar personalizado */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    /* Prevent body scroll bleed through modals */
    body.modal-open { overflow: hidden; }

    /* Truncate long text cells */
    td.truncate-cell { max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  </style>
</head>
<body class="bg-gray-50 font-sans text-slate-800 antialiased">

  <!-- ─── LAYOUT ─────────────────────────────────────────── -->
  <div class="flex h-screen overflow-hidden">

    <!-- SIDEBAR -->
    <aside class="w-[200px] flex-shrink-0 bg-[#1E293B] flex flex-col select-none">
      <!-- Logo -->
      <div class="px-5 py-5 border-b border-slate-700">
        <div class="text-amber-400 font-bold text-base leading-tight">🍬 Akrif Sweet</div>
        <div class="text-slate-400 text-xs mt-0.5">Panel de administración</div>
      </div>

      <!-- Nav -->
      <nav class="flex-1 py-4 px-3 flex flex-col gap-1">
        <button data-view="albaranes"
          class="w-full text-left px-3 py-2.5 rounded-lg text-sm font-medium transition-colors flex items-center gap-2 text-slate-200 hover:bg-slate-700">
          <span>📄</span> Albaranes
        </button>
        <button data-view="clientes"
          class="w-full text-left px-3 py-2.5 rounded-lg text-sm font-medium transition-colors flex items-center gap-2 text-slate-200 hover:bg-slate-700">
          <span>👥</span> Clientes
        </button>
        <button data-view="productos"
          class="w-full text-left px-3 py-2.5 rounded-lg text-sm font-medium transition-colors flex items-center gap-2 text-slate-200 hover:bg-slate-700">
          <span>📦</span> Productos
        </button>
      </nav>

      <!-- Footer sidebar -->
      <div class="px-5 py-4 border-t border-slate-700">
        <div class="text-slate-500 text-xs">v1.0.0</div>
      </div>
    </aside>

    <!-- MAIN AREA -->
    <main class="flex-1 flex flex-col overflow-hidden">

      <!-- Header -->
      <header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between flex-shrink-0">
        <h1 id="view-title" class="text-lg font-bold text-slate-800">📄 Albaranes</h1>
        <div class="flex items-center gap-2 text-xs text-slate-400">
          <span class="inline-block w-2 h-2 rounded-full bg-green-400"></span>
          Panel interno
        </div>
      </header>

      <!-- Content -->
      <div class="flex-1 overflow-auto p-6">
        <div id="view-container"></div>
      </div>

    </main>
  </div>

  <!-- ─── MODAL OVERLAY ──────────────────────────────────── -->
  <div id="modal-overlay" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-6">
    <div id="modal-box" class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto p-6"></div>
  </div>

  <!-- ─── TOAST CONTAINER ────────────────────────────────── -->
  <div id="toast-container" class="fixed top-5 right-5 z-[60] flex flex-col gap-2 pointer-events-none"></div>

  <!-- ─── SCRIPTS ────────────────────────────────────────── -->
  <script src="api.js"></script>
  <script src="app.js"></script>

</body>
</html>
